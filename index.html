<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1d4ed8" />
    <title>LifeMate</title>
    <script>
      // 테마 깜빡임 방지: 앱 스크립트보다 먼저 data-theme 를 확정합니다.
      (function () {
        try {
          var pref = localStorage.getItem('app:theme') || 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <style>
      /* 스플래시: 번들 로딩 동안 즉시 표시되도록 인라인으로 둡니다. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(160deg, #2563eb 0%, #1d4ed8 60%, #1e3a8a 100%);
        transition: opacity 0.45s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash .logo {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.14);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
        animation: splash-pop 0.5s ease;
      }
      #splash .name {
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Noto Sans KR', sans-serif;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      #splash .tagline {
        color: rgba(255, 255, 255, 0.82);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Noto Sans KR', sans-serif;
        font-size: 13px;
        margin-top: -10px;
      }
      #splash .spinner {
        width: 26px;
        height: 26px;
        margin-top: 6px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes splash-pop {
        from {
          transform: scale(0.7);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="splash">
      <div class="logo">
        <svg width="58" height="58" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="30" r="23" stroke="#fff" stroke-width="4" stroke-opacity="0.55" />
          <path d="M30 16 V30 L39 35" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <div class="name">LifeMate</div>
      <div class="tagline">하루를 관리하는 나의 파트너</div>
      <div class="spinner"></div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
